[pytest]
testpaths = test
norecursedirs = _archive
markers =
    unit: Core unit tests (packet parser, flow state, flow manager, features) - fast
    integration: Full pipeline integration tests
    sqli: SQLi detection tests
    dataset: Tests requiring CSV dataset files (slow)
    kruegel: Kruegel-Vigna anomaly detection model tests
    wamm: WAMM classifier tests (requires trained model)
