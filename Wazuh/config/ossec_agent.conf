<!--
  Wazuh Agent Local File Configuration — RL Defense Integration

  Đặt snippet này vào /var/ossec/etc/ossec.conf của Wazuh Agent
  trong thẻ <ossec_config>.

  Đổi <location> thành đường dẫn tuyệt đối đến actions_wazuh.log trên máy bạn.
-->

<ossec_config>

  <!-- RL Defense Agent — actions_wazuh.log (JSONL format, 1 dòng = 1 quyết định) -->
  <localfile>
    <log_format>json</log_format>
    <location>/home/binhhl/Downloads/rl-defense-agent/AI RL/actions_wazuh.log</location>
    <label key="source">rl_defense_agent</label>
    <label key="version">v3</label>
    <label key="component">infer.py</label>
  </localfile>

  <!-- Optional: monitor sniffer output (raw NIDS features per window) -->
  <!--
  <localfile>
    <log_format>json</log_format>
    <location>/tmp/sniffer_output.jsonl</location>
    <label key="source">nids_sniffer</label>
  </localfile>
  -->

</ossec_config>
